name: rongwang-health

services:
  # ========== 后台: GEOFlow 内容引擎 ==========
  geoflow:
    build:
      context: ./geoflow
      dockerfile: docker/Dockerfile
      target: web
    ports:
      - "18080:8080"
    environment:
      - HOST_PORT=8080
      - DB_DRIVER=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=geo_system
      - DB_USER=geo_user
      - DB_PASSWORD=${GEO_DB_PASSWORD:-geo_password_secure}
      - DB_EXPOSE_PORT=15432
      - CRON_INTERVAL=60
      - APP_SECRET_KEY=${GEO_APP_SECRET:-replace-with-long-random-secret}
      - SITE_URL=${GEO_SITE_URL:-http://localhost:18080}
      - TZ=Asia/Shanghai
      - REQUIRE_STRONG_APP_SECRET=false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rongwang-net
    volumes:
      - geoflow-data:/var/www/html/data

  # ========== GEOFlow Scheduler + Worker ==========
  geoflow-scheduler:
    build:
      context: ./geoflow
      dockerfile: docker/Dockerfile
      target: scheduler
    environment:
      - DB_DRIVER=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=geo_system
      - DB_USER=geo_user
      - DB_PASSWORD=${GEO_DB_PASSWORD:-geo_password_secure}
      - CRON_INTERVAL=60
      - APP_SECRET_KEY=${GEO_APP_SECRET:-replace-with-long-random-secret}
      - TZ=Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rongwang-net
    volumes:
      - geoflow-data:/var/www/html/data

  # ========== PostgreSQL ==========
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=geo_system
      - POSTGRES_USER=geo_user
      - POSTGRES_PASSWORD=${GEO_DB_PASSWORD:-geo_password_secure}
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo_user -d geo_system"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rongwang-net

volumes:
  postgres-data:
  geoflow-data:

networks:
  rongwang-net:
    driver: bridge
